services:
  postgres:
    image: postgres:16-alpine
    container_name: salud-intercultural-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: salud_intercultural
      POSTGRES_PASSWORD: salud_intercultural
      POSTGRES_DB: salud_intercultural_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salud_intercultural -d salud_intercultural_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
